name: GM Release Workflow

on:  
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - dev
      targets:
        description: 'Build targets (standard = win-x64 + linux-x64 only)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - standard
          - all
  # push:
  #   branches:
  #     - main

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout NordvikManager FrontEnd repository
        uses: actions/checkout@v4
        with:
          repository: haffff/NordvikManagerFrontend
          ref: ${{ github.event.inputs.build_type == 'dev' && 'development' || 'main' }}
          path: frontend
      - name: Checkout NordvikManager Configuration
        uses: actions/checkout@v4
        with:
          path: config
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.7.0'
      - name: get env file
        run: |
          mv config/releaseconfig/all_in_one/client/.env frontend/.env
      - name: Install dependencies
        run: |
          cd frontend
          pnpm install
          pnpm run buildci_gm
          cd ..
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: frontend/build
  build_backend:
      runs-on: ubuntu-latest
      needs: [build_frontend]
      strategy:
        matrix:
          include:
            - rid: win-x64
              name: win-x64
              standard: true
            - rid: win-x86
              name: win-x86
              standard: false
            - rid: win-arm64
              name: win-arm64
              standard: false
            - rid: linux-x64
              name: linux-x64
              standard: true
            - rid: linux-arm
              name: linux-arm
              standard: false
            - rid: linux-arm64
              name: linux-arm64
              standard: false
      steps:      
      - name: Check if target should be skipped
        id: check
        run: |
          TARGETS="${{ github.event.inputs.targets || 'auto' }}"
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          IS_STANDARD="${{ matrix.standard }}"

          # push trigger (no inputs) => always build all
          if [ "${{ github.event_name }}" = "push" ]; then TARGETS="all"; fi

          # auto: dev => standard, release => all
          if [ "$TARGETS" = "auto" ]; then
            if [ "$BUILD_TYPE" = "dev" ]; then TARGETS="standard"; else TARGETS="all"; fi
          fi

          if [ "$TARGETS" = "standard" ] && [ "$IS_STANDARD" = "false" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Checkout NordvikManager Backend repository
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with: 
          repository: haffff/NordvikManager-Backend
          ref: ${{ github.event.inputs.build_type == 'dev' && 'development' || 'main' }}
          path: backend
      - name: Checkout NordvikManager Configuration
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          path: config
      - name: Install Frontend
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: front-build
          path: backend/DNDOnePlaceManager/wwwroot
      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: dotnet restore backend/DNDOnePlaceManager.sln
      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: dotnet publish backend/DNDOnePlaceManager.sln -c Release -o ./build_${{ matrix.name }} -r ${{ matrix.rid }} --self-contained
      - name: Move config files
        if: steps.check.outputs.skip == 'false'
        run: |
          cp -r config/releaseconfig/all_in_one/server/* ./build_${{ matrix.name }}/
          rm ./build_${{ matrix.name }}/appsettings.Development.json
      - name: Upload artifacts
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: ./build_${{ matrix.name }}
  release:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      needs: [build_frontend, build_backend]
      steps:
        - name: Checkout NordvikManager Configuration
          uses: actions/checkout@v4
          with:
            path: config          
        - name: Set release version number and latest changes
          run: |
              export CURRENT_VERSION=$(jq -r '.CurrentVersion' config/version.json)
              echo "Current Version: $CURRENT_VERSION"
              BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
              if [ "$BUILD_TYPE" = "dev" ]; then
                SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
                CURRENT_VERSION="${CURRENT_VERSION}-dev.${SHORT_SHA}"
              fi
              echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
              export LATEST_CHANGES=$(jq -r '.LatestChanges | join("\n - ")' config/version.json)
              echo "Latest Changes: $LATEST_CHANGES"        
        - name: Download all build artifacts
          uses: actions/download-artifact@v4
          with:
            pattern: build-*
            path: ./artifacts
            merge-multiple: false
        - name: Create zip files for each target
          run: |
            for dir in ./artifacts/build-*/; do
              target=$(basename "$dir" | sed 's/^build-//')
              (cd "$dir" && zip -r "../../NordvikManager_${{ env.CURRENT_VERSION }}_${target}.zip" *)
            done
        - uses: marvinpinto/action-automatic-releases@latest
          with:
            repo_token: "${{ secrets.GITHUB_TOKEN }}"
            automatic_release_tag: "v${{ env.CURRENT_VERSION }}"
            prerelease: ${{ github.event.inputs.build_type == 'dev' }}
            title: "${{ github.event.inputs.build_type == 'dev' && 'Dev Build' || 'Release' }} ${{ env.CURRENT_VERSION }}"
            files: "NordvikManager_${{ env.CURRENT_VERSION }}_*.zip"
