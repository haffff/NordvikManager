name: Player Frontend Deployment Workflow

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - dev
    
  # push:
  #   branches:
  #     - main

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout NordvikManager FrontEnd repository
        uses: actions/checkout@v4
        with:
          repository: haffff/NordvikManagerFrontend
          ref: ${{ github.event.inputs.build_type == 'dev' && 'dev' || 'main' }}
          path: frontend
      - name: Checkout NordvikManager Configuration
        uses: actions/checkout@v4
        with:
          path: config
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.7.0'
      - name: get env file
        run: |
          mv config/releaseconfig/all_in_one/client/.env frontend/.env
      - name: Install dependencies
        run: |
          cd frontend
          pnpm install
          pnpm run buildci_player
          cd ..
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: frontend/build
  deploy_frontend:
      runs-on: ubuntu-latest
      needs: [build_frontend]
      steps:      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: front-build
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@4.0.0
        with:
          server: ${{ secrets.FRONT_FTP_SERVER }}
          username: ${{ secrets.FRONT_FTP_USERNAME }}
          password: ${{ secrets.FRONT_FTP_PASSWORD }}
          local-dir: .
          server-dir: /client